<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Squad Fitness</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-hover: #222633;
    --border: #2a2e3d;
    --text: #e8eaf0;
    --text-muted: #8b90a0;
    --accent-cycling: #3b82f6;
    --accent-cardio: #f97316;
    --accent-strength: #a855f7;
    --accent-cycling-bg: rgba(59, 130, 246, 0.12);
    --accent-cardio-bg: rgba(249, 115, 22, 0.12);
    --accent-strength-bg: rgba(168, 85, 247, 0.12);
    --radius: 14px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 100px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-top: 12px;
  }

  .header h1 {
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 1.75rem;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #3b82f6, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .user-select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%238b90a0' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 10px center;
    padding-right: 30px;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    padding: 4px;
    border-radius: var(--radius);
    margin-bottom: 24px;
  }

  .tab {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: all 0.2s ease;
  }

  .tab.active {
    background: var(--bg);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  /* Views */
  .view { display: none; }
  .view.active { display: block; }

  /* Log Form */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 20px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-group:last-child {
    margin-bottom: 0;
  }

  .form-label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .activity-options {
    display: flex;
    gap: 8px;
  }

  .activity-btn {
    flex: 1;
    padding: 14px 8px;
    border: 2px solid var(--border);
    background: transparent;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .activity-btn .icon {
    font-size: 1.4rem;
  }

  .activity-btn .label {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-muted);
  }

  .activity-btn[data-type="cycling"].selected {
    border-color: var(--accent-cycling);
    background: var(--accent-cycling-bg);
  }
  .activity-btn[data-type="cycling"].selected .label { color: var(--accent-cycling); }

  .activity-btn[data-type="cardio"].selected {
    border-color: var(--accent-cardio);
    background: var(--accent-cardio-bg);
  }
  .activity-btn[data-type="cardio"].selected .label { color: var(--accent-cardio); }

  .activity-btn[data-type="strength"].selected {
    border-color: var(--accent-strength);
    background: var(--accent-strength-bg);
  }
  .activity-btn[data-type="strength"].selected .label { color: var(--accent-strength); }

  .muscle-group-section {
    display: none;
    margin-top: 12px;
  }

  .muscle-group-section.visible {
    display: block;
  }

  .muscle-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .muscle-chip {
    padding: 8px 14px;
    border: 1.5px solid var(--border);
    background: transparent;
    border-radius: 20px;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .muscle-chip.selected {
    border-color: var(--accent-strength);
    background: var(--accent-strength-bg);
    color: var(--accent-strength);
  }

  .input-field {
    width: 100%;
    padding: 12px 14px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    transition: border-color 0.2s ease;
  }

  .input-field:focus {
    outline: none;
    border-color: #3b82f6;
  }

  .input-field::placeholder {
    color: var(--text-muted);
    opacity: 0.6;
  }

  .duration-options {
    display: flex;
    gap: 8px;
  }

  .duration-btn {
    flex: 1;
    padding: 14px 8px;
    border: 2px solid var(--border);
    background: transparent;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .duration-btn .dur-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-muted);
  }

  .duration-btn .dur-value {
    font-family: 'Outfit', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text);
  }

  .duration-btn.selected {
    border-color: #3b82f6;
    background: rgba(59, 130, 246, 0.12);
  }

  .duration-btn.selected .dur-label { color: #3b82f6; }
  .duration-btn.selected .dur-value { color: #3b82f6; }

  .submit-btn {
    width: 100%;
    padding: 16px;
    margin-top: 24px;
    border: none;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    background: linear-gradient(135deg, #3b82f6, #a855f7);
    color: white;
    letter-spacing: 0.3px;
  }

  .submit-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
  }

  .submit-btn:active {
    transform: translateY(0);
  }

  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #22c55e;
    color: white;
    padding: 12px 24px;
    border-radius: 30px;
    font-weight: 600;
    font-size: 0.875rem;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    z-index: 100;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Feed */
  .feed-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .feed-title {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
  }

  .feed-filter {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 6px 12px;
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%238b90a0' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 10px center;
    padding-right: 26px;
  }

  .entry-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 10px;
    transition: background 0.15s ease;
  }

  .entry-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .entry-user {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.8rem;
    color: white;
    flex-shrink: 0;
  }

  .entry-name {
    font-weight: 600;
    font-size: 0.95rem;
  }

  .entry-date {
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .entry-body {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .entry-type-badge {
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .badge-cycling {
    background: var(--accent-cycling-bg);
    color: var(--accent-cycling);
  }
  .badge-cardio {
    background: var(--accent-cardio-bg);
    color: var(--accent-cardio);
  }
  .badge-strength {
    background: var(--accent-strength-bg);
    color: var(--accent-strength);
  }

  .entry-details {
    flex: 1;
    min-width: 0;
  }

  .entry-duration {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 1.2rem;
  }

  .entry-muscle {
    font-size: 0.8rem;
    color: var(--accent-strength);
    margin-top: 2px;
  }

  .entry-notes {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 4px;
    font-style: italic;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-state .icon {
    font-size: 3rem;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  .empty-state p {
    font-size: 0.9rem;
  }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 16px;
  }

  .stat-value {
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 1.8rem;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
  }

  .stat-card.wide {
    grid-column: 1 / -1;
  }

  .streak-bar {
    display: flex;
    gap: 4px;
    margin-top: 12px;
  }

  .streak-day {
    flex: 1;
    height: 6px;
    border-radius: 3px;
    background: var(--border);
  }

  .streak-day.active {
    background: linear-gradient(135deg, #3b82f6, #a855f7);
  }

  .streak-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
  }

  .streak-labels span {
    font-size: 0.65rem;
    color: var(--text-muted);
  }

  /* Leaderboard */
  .leaderboard-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .leaderboard-title {
    padding: 16px 18px 12px;
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
  }

  .leaderboard-row {
    display: flex;
    align-items: center;
    padding: 12px 18px;
    gap: 12px;
    border-top: 1px solid var(--border);
  }

  .lb-rank {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    width: 24px;
    text-align: center;
    color: var(--text-muted);
  }

  .lb-rank.gold { color: #fbbf24; }
  .lb-rank.silver { color: #94a3b8; }
  .lb-rank.bronze { color: #d97706; }

  .lb-name {
    flex: 1;
    font-weight: 600;
    font-size: 0.9rem;
  }

  .lb-value {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  /* Nav */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: center;
    max-width: 480px;
    margin: 0 auto;
    padding: 8px 0;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
    z-index: 50;
  }

  .nav-btn {
    flex: 1;
    max-width: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 8px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: color 0.2s ease;
    font-family: 'DM Sans', sans-serif;
  }

  .nav-btn .nav-icon { font-size: 1.3rem; }
  .nav-btn .nav-label { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

  .nav-btn.active { color: #3b82f6; }

  /* Animations */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .entry-card {
    animation: fadeInUp 0.3s ease both;
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>Squad Fitness</h1>
    <div class="header-right">
      <select class="user-select" id="currentUser">
        <option value="Phil">Phil</option>
        <option value="Alex">Alex</option>
        <option value="Sam">Sam</option>
      </select>
    </div>
  </div>

  <!-- Log View -->
  <div class="view active" id="view-log">
    <div class="form-card">
      <div class="form-group">
        <label class="form-label">Activity</label>
        <div class="activity-options">
          <button class="activity-btn" data-type="cycling" onclick="selectActivity('cycling')">
            <span class="icon">🚴</span>
            <span class="label">Cycling</span>
          </button>
          <button class="activity-btn" data-type="cardio" onclick="selectActivity('cardio')">
            <span class="icon">🏃</span>
            <span class="label">Cardio</span>
          </button>
          <button class="activity-btn" data-type="strength" onclick="selectActivity('strength')">
            <span class="icon">🏋️</span>
            <span class="label">Strength</span>
          </button>
        </div>
        <div class="muscle-group-section" id="muscleSection">
          <label class="form-label" style="margin-top: 16px;">Muscle Group</label>
          <div class="muscle-chips">
            <button class="muscle-chip" onclick="selectMuscle(this)">Chest</button>
            <button class="muscle-chip" onclick="selectMuscle(this)">Back</button>
            <button class="muscle-chip" onclick="selectMuscle(this)">Legs</button>
            <button class="muscle-chip" onclick="selectMuscle(this)">Shoulders</button>
            <button class="muscle-chip" onclick="selectMuscle(this)">Arms</button>
            <button class="muscle-chip" onclick="selectMuscle(this)">Core</button>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Duration</label>
        <div class="duration-options">
          <button class="duration-btn" data-duration="30" onclick="selectDuration(this, 30)">
            <span class="dur-label">Short</span>
            <span class="dur-value">30</span>
            <span class="dur-label">min</span>
          </button>
          <button class="duration-btn" data-duration="45" onclick="selectDuration(this, 45)">
            <span class="dur-label">Medium</span>
            <span class="dur-value">45</span>
            <span class="dur-label">min</span>
          </button>
          <button class="duration-btn" data-duration="60" onclick="selectDuration(this, 60)">
            <span class="dur-label">Long</span>
            <span class="dur-value">60</span>
            <span class="dur-label">min</span>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Date</label>
        <input type="date" class="input-field" id="entryDate">
      </div>

      <div class="form-group">
        <label class="form-label">Notes (optional)</label>
        <input type="text" class="input-field" id="notes" placeholder="How did it go?">
      </div>

      <button class="submit-btn" onclick="logEntry()">Log Activity</button>
    </div>
  </div>

  <!-- Feed View -->
  <div class="view" id="view-feed">
    <div class="feed-header">
      <span class="feed-title">Recent Activity</span>
      <select class="feed-filter" id="feedFilter" onchange="renderFeed()">
        <option value="all">Everyone</option>
        <option value="Phil">Phil</option>
        <option value="Alex">Alex</option>
        <option value="Sam">Sam</option>
      </select>
    </div>
    <div id="feedList"></div>
  </div>

  <!-- Stats View -->
  <div class="view" id="view-stats">
    <div class="stats-grid" id="statsGrid"></div>
    <div class="leaderboard-card" id="leaderboard"></div>
  </div>
</div>

<div class="toast" id="toast">Activity logged!</div>

<nav class="bottom-nav">
  <button class="nav-btn active" onclick="switchView('log')">
    <span class="nav-icon">+</span>
    <span class="nav-label">Log</span>
  </button>
  <button class="nav-btn" onclick="switchView('feed')">
    <span class="nav-icon">📋</span>
    <span class="nav-label">Feed</span>
  </button>
  <button class="nav-btn" onclick="switchView('stats')">
    <span class="nav-icon">📊</span>
    <span class="nav-label">Stats</span>
  </button>
</nav>

<script>
  // --- State ---
  let entries = [];
  let selectedActivity = null;
  let selectedMuscle = null;
  let selectedDuration = null;

  // Seed some demo data
  const demoData = [
    { user: 'Phil', type: 'cycling', duration: 45, date: '2026-04-02', notes: 'Morning ride along the bay', muscle: null },
    { user: 'Alex', type: 'strength', duration: 60, date: '2026-04-02', notes: 'Feeling strong', muscle: 'Chest' },
    { user: 'Sam', type: 'cardio', duration: 30, date: '2026-04-02', notes: '', muscle: null },
    { user: 'Phil', type: 'strength', duration: 50, date: '2026-04-01', notes: 'Heavy deadlifts', muscle: 'Back' },
    { user: 'Alex', type: 'cycling', duration: 90, date: '2026-04-01', notes: 'Long weekend ride', muscle: null },
    { user: 'Sam', type: 'strength', duration: 40, date: '2026-04-01', notes: '', muscle: 'Legs' },
    { user: 'Phil', type: 'cardio', duration: 25, date: '2026-03-31', notes: 'Treadmill intervals', muscle: null },
    { user: 'Sam', type: 'cycling', duration: 35, date: '2026-03-31', notes: 'Quick spin', muscle: null },
    { user: 'Alex', type: 'cardio', duration: 45, date: '2026-03-30', notes: 'Rowing machine', muscle: null },
    { user: 'Phil', type: 'strength', duration: 55, date: '2026-03-30', notes: 'Shoulder press PR!', muscle: 'Shoulders' },
  ];

  entries = [...demoData];

  // Set default date
  document.getElementById('entryDate').valueAsDate = new Date();

  // --- Activity selection ---
  function selectActivity(type) {
    selectedActivity = type;
    selectedMuscle = null;
    document.querySelectorAll('.activity-btn').forEach(b => b.classList.remove('selected'));
    document.querySelector(`.activity-btn[data-type="${type}"]`).classList.add('selected');
    document.querySelectorAll('.muscle-chip').forEach(c => c.classList.remove('selected'));

    const muscleSection = document.getElementById('muscleSection');
    muscleSection.classList.toggle('visible', type === 'strength');
  }

  function selectMuscle(chip) {
    document.querySelectorAll('.muscle-chip').forEach(c => c.classList.remove('selected'));
    chip.classList.add('selected');
    selectedMuscle = chip.textContent;
  }

  function selectDuration(btn, mins) {
    selectedDuration = mins;
    document.querySelectorAll('.duration-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  }

  // --- Log entry ---
  function logEntry() {
    const user = document.getElementById('currentUser').value;
    const duration = selectedDuration;
    const date = document.getElementById('entryDate').value;
    const notes = document.getElementById('notes').value.trim();

    if (!selectedActivity) return alert('Pick an activity!');
    if (!duration) return alert('Pick a duration.');
    if (!date) return alert('Pick a date.');
    if (selectedActivity === 'strength' && !selectedMuscle) return alert('Select a muscle group.');

    const entry = {
      user,
      type: selectedActivity,
      duration,
      date,
      notes,
      muscle: selectedActivity === 'strength' ? selectedMuscle : null
    };

    entries.unshift(entry);

    // TODO: POST to Cloud Function here
    // fetch(CLOUD_FUNCTION_URL + '/log', { method: 'POST', body: JSON.stringify(entry) })

    showToast();
    resetForm();
  }

  function resetForm() {
    selectedActivity = null;
    selectedMuscle = null;
    selectedDuration = null;
    document.querySelectorAll('.activity-btn').forEach(b => b.classList.remove('selected'));
    document.querySelectorAll('.muscle-chip').forEach(c => c.classList.remove('selected'));
    document.querySelectorAll('.duration-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('muscleSection').classList.remove('visible');
    document.getElementById('notes').value = '';
    document.getElementById('entryDate').valueAsDate = new Date();
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // --- Navigation ---
  function switchView(view) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(`view-${view}`).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    event.currentTarget.classList.add('active');

    if (view === 'feed') renderFeed();
    if (view === 'stats') renderStats();
  }

  // --- Feed ---
  function renderFeed() {
    const filter = document.getElementById('feedFilter').value;
    const filtered = filter === 'all' ? entries : entries.filter(e => e.user === filter);
    const list = document.getElementById('feedList');

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="icon">🏃</div><p>No activities yet. Get moving!</p></div>`;
      return;
    }

    const colors = { Phil: '#3b82f6', Alex: '#f97316', Sam: '#a855f7' };

    list.innerHTML = filtered.map((e, i) => {
      const badgeClass = e.type === 'cycling' ? 'badge-cycling' : e.type === 'cardio' ? 'badge-cardio' : 'badge-strength';
      const typeLabel = e.type === 'strength' ? 'Strength' : e.type === 'cardio' ? 'Cardio' : 'Cycling';
      const dateObj = new Date(e.date + 'T00:00:00');
      const dateStr = dateObj.toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short' });

      return `
        <div class="entry-card" style="animation-delay: ${i * 0.05}s">
          <div class="entry-top">
            <div class="entry-user">
              <div class="avatar" style="background: ${colors[e.user] || '#666'}">${e.user[0]}</div>
              <div>
                <div class="entry-name">${e.user}</div>
                <div class="entry-date">${dateStr}</div>
              </div>
            </div>
            <span class="entry-type-badge ${badgeClass}">${typeLabel}</span>
          </div>
          <div class="entry-body">
            <div class="entry-details">
              <div class="entry-duration">${e.duration} min</div>
              ${e.muscle ? `<div class="entry-muscle">${e.muscle}</div>` : ''}
              ${e.notes ? `<div class="entry-notes">"${e.notes}"</div>` : ''}
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  // --- Stats ---
  function renderStats() {
    const grid = document.getElementById('statsGrid');
    const lb = document.getElementById('leaderboard');

    const thisWeekStart = new Date();
    thisWeekStart.setDate(thisWeekStart.getDate() - thisWeekStart.getDay());
    thisWeekStart.setHours(0, 0, 0, 0);

    const weekEntries = entries.filter(e => new Date(e.date + 'T00:00:00') >= thisWeekStart);
    const totalMinutes = weekEntries.reduce((sum, e) => sum + e.duration, 0);
    const totalSessions = weekEntries.length;
    const uniqueDays = new Set(weekEntries.map(e => e.date)).size;

    // Last 7 days streak
    const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
    const streakDays = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const dateStr = d.toISOString().split('T')[0];
      streakDays.push({
        label: days[d.getDay() === 0 ? 6 : d.getDay() - 1],
        active: entries.some(e => e.date === dateStr)
      });
    }

    grid.innerHTML = `
      <div class="stat-card">
        <div class="stat-value">${totalMinutes}</div>
        <div class="stat-label">Minutes this week</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${totalSessions}</div>
        <div class="stat-label">Sessions this week</div>
      </div>
      <div class="stat-card wide">
        <div class="stat-value">${uniqueDays} <span style="font-size: 0.9rem; color: var(--text-muted); font-weight: 400;">/ 7 days</span></div>
        <div class="stat-label">Active days this week</div>
        <div class="streak-bar">
          ${streakDays.map(d => `<div class="streak-day ${d.active ? 'active' : ''}"></div>`).join('')}
        </div>
        <div class="streak-labels">
          ${streakDays.map(d => `<span>${d.label}</span>`).join('')}
        </div>
      </div>
    `;

    // Leaderboard
    const userTotals = {};
    entries.forEach(e => {
      userTotals[e.user] = (userTotals[e.user] || 0) + e.duration;
    });
    const sorted = Object.entries(userTotals).sort((a, b) => b[1] - a[1]);
    const rankClasses = ['gold', 'silver', 'bronze'];

    lb.innerHTML = `
      <div class="leaderboard-title">Leaderboard — Total Minutes</div>
      ${sorted.map(([name, mins], i) => `
        <div class="leaderboard-row">
          <span class="lb-rank ${rankClasses[i] || ''}">${i + 1}</span>
          <span class="lb-name">${name}</span>
          <span class="lb-value">${mins} min</span>
        </div>
      `).join('')}
    `;
  }
</script>

</body>
</html>
